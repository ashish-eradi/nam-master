name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_USERNAME: ashisheradi

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
    - name: Test with pytest
      run: |
        pytest backend/tests

  frontend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
    - name: Install dependencies for superadmin-portal
      run: npm install --prefix frontend/superadmin-portal
    - name: Run tests for superadmin-portal
      run: npm test --prefix frontend/superadmin-portal
    - name: Install dependencies for school-portal
      run: npm install --prefix frontend/school-portal
    - name: Run tests for school-portal
      run: npm test --prefix frontend/school-portal
    - name: Install dependencies for family-portal
      run: npm install --prefix frontend/family-portal
    - name: Run tests for family-portal
      run: npm test --prefix frontend/family-portal

  build-and-push:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main' # Only run on pushes to main branch
    steps:
    - uses: actions/checkout@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Build and push backend image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: ${{ env.DOCKER_USERNAME }}/nam-backend:${{ github.sha }}
    - name: Build and push superadmin-portal image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend/superadmin-portal
        push: true
        tags: ${{ env.DOCKER_USERNAME }}/nam-superadmin-portal:${{ github.sha }}
    - name: Build and push school-portal image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend/school-portal
        push: true
        tags: ${{ env.DOCKER_USERNAME }}/nam-school-portal:${{ github.sha }}
    - name: Build and push family-portal image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend/family-portal
        push: true
        tags: ${{ env.DOCKER_USERNAME }}/nam-family-portal:${{ github.sha }}
